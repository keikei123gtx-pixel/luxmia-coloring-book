name: All k Music — Phase 4 YouTube アップロード

on:
  # Phase 3 完了時に自動チェーン (成功時のみ)
  workflow_run:
    workflows: ["All k Music — Phase 3 動画エンコード + SEO"]
    types: [completed]

  # 手動実行
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Phase 3 の Actions Run ID (動画 Artifact を取得)"
        required: false
        default: ""
      genre:
        description: "ジャンルを絞り込む場合に指定"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - lofi
          - edm
          - ambient
          - synthwave
      privacy:
        description: "YouTube 公開設定"
        required: false
        default: "unlisted"
        type: choice
        options:
          - unlisted
          - public
          - private

permissions:
  contents: write

jobs:
  phase4:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 60

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 1. チェックアウト ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. 依存ライブラリ ─────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests Pillow \
                      google-api-python-client \
                      google-auth \
                      google-auth-httplib2

      # ── 4. Phase 3 Artifact から動画 + SEO をダウンロード ────────────────
      - name: Download Phase 3 video artifact (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: allk-videos-*
          merge-multiple: true
          path: all_k_music/

      - name: Download Phase 3 video artifact (workflow_dispatch)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.source_run_id != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.source_run_id }}
          pattern: allk-videos-*
          merge-multiple: true
          path: all_k_music/

      # ── 5. ダウンロード結果確認 ──────────────────────────────────────────
      - name: Inspect assets
        run: |
          echo "=== 動画ファイル ==="
          find all_k_music/assets/videos/ -name "*.mp4" | sort || echo "(MP4 なし)"
          echo "=== SEO テキスト ==="
          find all_k_music/assets/seo/ -name "*.txt" | sort || echo "(SEO なし)"
          echo "=== サムネイル ==="
          find all_k_music/assets/thumbnails/ -name "*.jpg" | sort || echo "(JPG なし)"

      # ── 6. Phase 4 実行 (YouTube アップロード) ───────────────────────────
      - name: Phase 4 — YouTube アップロード
        working-directory: all_k_music
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          GENRE_ARG=""
          if [ -n "${{ github.event.inputs.genre }}" ]; then
            GENRE_ARG="--genre ${{ github.event.inputs.genre }}"
          fi

          PRIVACY="${{ github.event.inputs.privacy }}"
          PRIVACY="${PRIVACY:-unlisted}"

          if [ -z "$YOUTUBE_CLIENT_ID" ] || [ -z "$YOUTUBE_REFRESH_TOKEN" ]; then
            echo "::error::YOUTUBE_CLIENT_ID または YOUTUBE_REFRESH_TOKEN が未設定です。"
            echo "::error::GitHub Secrets に登録してから再実行してください。"
            exit 1
          fi

          echo "::notice::YouTube 認証情報確認済み → アップロード開始 (privacy=$PRIVACY)"
          python main.py --phase 4 --privacy "$PRIVACY" $GENRE_ARG

      # ── 7. アップロードログをリポジトリに書き戻す ────────────────────────
      - name: Commit upload log to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_k_music/logs/music_assets.json
          git diff --staged --quiet \
            || git commit -m "chore(phase4): YouTube upload log $(date -u +%Y-%m-%d) run#${{ github.run_number }} [skip ci]"
          git push

      # ── 8. アップロード結果サマリー ──────────────────────────────────────
      - name: Upload summary
        if: always()
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('all_k_music/logs/music_assets.json')
          if not p.exists():
              print('music_assets.json が見つかりません')
              exit(0)
          entries = json.loads(p.read_text())
          print('=' * 60)
          print('  All k Music — YouTube アップロード結果')
          print('=' * 60)
          for e in entries:
              if e.get('phase') == '4-uploaded':
                  notes = e.get('notes', '')
                  print(f'  [{e[\"genre_slug\"]:12}]  {notes}')
          print('=' * 60)
          "
