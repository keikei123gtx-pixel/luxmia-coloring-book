name: All k Music — Phase 2 メドレー + Human DNA + サムネイル

on:
  # 手動実行
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Phase 1 の Actions Run ID (省略時は既存 tracks/ を使用)"
        required: false
        default: ""
      genre:
        description: "ジャンルを絞り込む場合に指定"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - lofi
          - edm
          - ambient
          - synthwave
      style:
        description: "動画スタイル"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - ncs
          - lofi_girl

# music_assets.json + thumbnails をリポジトリに書き戻すために必要
permissions:
  contents: write

jobs:
  phase2:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 60   # DNA 適用 × 4 ジャンル + メドレー生成の余裕

    steps:
      # ── 1. チェックアウト ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. ffmpeg + 依存ライブラリ ────────────────────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install requests Pillow

      # ── 3b. フォントインストール (NCS / LoFi Girl スタイルのテキスト描画に必要) ──
      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-dejavu-core fonts-liberation
          fc-cache -f
          echo "DejaVu: $(fc-list | grep -i dejavusans | head -1)"

      # ── 4. Phase 1 Artifact から MP3 をダウンロード ──────────────────────
      #   workflow_run: Phase 1 の当該 run から自動取得
      #   workflow_dispatch + source_run_id 指定: 指定 run から取得
      #   workflow_dispatch + source_run_id 未指定: スキップ (既存 tracks/ を使用)
      - name: Download Phase 1 tracks artifact (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: allk-tracks-*
          merge-multiple: true
          path: all_k_music/assets/tracks/

      - name: Download Phase 1 tracks artifact (workflow_dispatch)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.source_run_id != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.source_run_id }}
          pattern: allk-tracks-*
          merge-multiple: true
          path: all_k_music/assets/tracks/

      # ── 5. ダウンロードされた tracks を確認 ─────────────────────────────
      - name: Inspect downloaded tracks
        run: |
          echo "=== all_k_music/assets/tracks/ ==="
          find all_k_music/assets/tracks/ -name "*.mp3" | sort || echo "(MP3 なし)"
          echo "=== all_k_music/logs/music_assets.json ==="
          python3 -c "
          import json, pathlib
          p = pathlib.Path('all_k_music/logs/music_assets.json')
          if p.exists():
              entries = json.loads(p.read_text())
              print(f'  エントリ数: {len(entries)}')
              for e in entries:
                  print(f'  - {e[\"asset_id\"]} | {e[\"genre_slug\"]} | {e[\"status\"]} | {e[\"phase\"]}')
          else:
              print('  (ファイルなし)')
          "

      # ── 5b. テスト音源を自動生成 (実 MP3 が 0 件の場合のみ) ─────────────
      #   SUNO_COOKIE 未設定の DEMO 環境や CI テスト時に使用。
      #   ffmpeg の lavfi で 90 秒のサイン波 MP3 を 4 ジャンル分生成する。
      #   本番 (LIVE MODE) では Phase 1 の実 MP3 が tracks/ に存在するためスキップ。
      - name: Generate test audio (if no real MP3s available)
        run: |
          MP3_COUNT=$(find all_k_music/assets/tracks/ -name "*.mp3" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$MP3_COUNT" -eq 0 ]; then
            echo "::warning::実 MP3 が 0 件 → ffmpeg でテスト用サイン波 MP3 を生成します (各90秒)"
            TODAY=$(date +%Y%m%d)
            declare -A FREQS=([lofi]=220 [edm]=440 [ambient]=110 [synthwave]=330)
            for SLUG in lofi edm ambient synthwave; do
              FREQ=${FREQS[$SLUG]}
              OUT="all_k_music/assets/tracks/${TODAY}_${SLUG}_TEST.mp3"
              ffmpeg -y -f lavfi \
                -i "sine=frequency=${FREQ}:duration=90" \
                -q:a 2 "$OUT" -loglevel error
              SIZE=$(du -k "$OUT" | cut -f1)
              echo "  ✓ ${OUT##*/}  (${SIZE}KB  ${FREQ}Hz  90s)"
            done
          else
            echo "::notice::実 MP3 ${MP3_COUNT} 件を検出 → テスト音源の生成をスキップ"
            find all_k_music/assets/tracks/ -name "*.mp3" | sort
          fi

      # ── 6. Phase 2 実行 (メドレー + DNA + サムネイル) ────────────────────
      - name: Phase 2 — メドレー生成 + Human DNA + サムネイル
        working-directory: all_k_music
        run: |
          GENRE_ARG=""
          if [ -n "${{ github.event.inputs.genre }}" ]; then
            GENRE_ARG="--genre ${{ github.event.inputs.genre }}"
          fi
          STYLE="${{ github.event.inputs.style }}"
          STYLE_ARG=""
          if [ -n "$STYLE" ] && [ "$STYLE" != "default" ]; then
            STYLE_ARG="--style $STYLE"
          fi
          python main.py --phase 2 $GENRE_ARG $STYLE_ARG

      # ── 6b. Phase 3 に引き渡す style を保存 ────────────────────────────
      - name: Save style config for Phase 3
        run: |
          STYLE="${{ github.event.inputs.style }}"
          echo "${STYLE:-default}" > all_k_music/.current_style
          echo "Phase 3 に渡す style: ${STYLE:-default}"

      # ── 7. サムネイル + ログをリポジトリに書き戻す ──────────────────────
      #   サムネイル (JPG ~350KB × 4) はリポジトリに保存
      #   メドレー MP3 (大容量) は Artifact のみ
      - name: Commit thumbnails and logs to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_k_music/assets/thumbnails/ \
                  all_k_music/logs/music_assets.json \
                  all_k_music/logs/asset_vault.jsonl
          git diff --staged --quiet \
            || git commit -m "chore(phase2): thumbnails + medley log $(date -u +%Y-%m-%d) run#${{ github.run_number }} [skip ci]"
          git push

      # ── 8. メドレー + サムネイルを Artifact として保存 (30日) ────────────
      #   Phase 3 がこの Artifact から medley MP3 を取得する
      - name: Upload medley and thumbnails as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allk-medley-${{ github.run_number }}
          path: |
            all_k_music/assets/medley/
            all_k_music/assets/thumbnails/
            all_k_music/logs/music_assets.json
            all_k_music/.current_style
          # thumbnails/ には LoFi Girl 背景 PNG (_bg.png) も含まれる
          retention-days: 30
          if-no-files-found: warn
